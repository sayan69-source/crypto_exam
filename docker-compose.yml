# CryptoExam Core — Development Docker Compose
# Usage: docker compose up -d
# Frontend: http://localhost:3000 | Backend: http://localhost:8000/docs

version: '3.9'

services:
  # ── PostgreSQL 16 ──
  postgres:
    image: postgres:16
    container_name: cryptoexam-postgres
    environment:
      POSTGRES_DB: cryptoexam
      POSTGRES_USER: ce
      POSTGRES_PASSWORD: dev_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ce", "-d", "cryptoexam"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 (session cache + Celery broker + pub/sub) ──
  redis:
    image: redis:7-alpine
    container_name: cryptoexam-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cryptoexam-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ce:dev_secret@postgres:5432/cryptoexam
      REDIS_URL: redis://redis:6379
      POLYGON_RPC_URL: https://rpc-amoy.polygon.technology
      DRAND_CHAIN_HASH: "8990e7a9aaed2ffed73dbd7092123d6f289930540d7651336225dc172e51b2ce"
      IPFS_API_URL: http://ipfs:5001
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LLM_BASE_URL: http://host.docker.internal:11434/v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ── Celery Worker (question generation, ZK proofs, blockchain TX) ──
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cryptoexam-celery
    command: celery -A app.celery_app worker -Q questions,crypto,blockchain -c 4 -l info
    environment:
      DATABASE_URL: postgresql+asyncpg://ce:dev_secret@postgres:5432/cryptoexam
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - backend
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ── Celery Beat (scheduled tasks) ──
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cryptoexam-celery-beat
    command: celery -A app.celery_app beat -l info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - celery
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ── IPFS Node (ZK proof + shard storage) ──
  ipfs:
    image: ipfs/kubo:v0.25.0
    container_name: cryptoexam-ipfs
    ports:
      - "4001:4001"   # Swarm
      - "5001:5001"   # API
      - "8080:8080"   # Gateway
    volumes:
      - ipfs_data:/data/ipfs
    restart: unless-stopped

  # ── Next.js 14 Frontend ──
  frontend:
    build:
      context: ./public/frontend
      dockerfile: Dockerfile
    container_name: cryptoexam-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./public/frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: cryptoexam-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ipfs_data:
