#!/usr/sbin/nft -f
# ZUUP-OS terminal firewall (spec §6.3) — default-drop, tunnel + loopback only.
#
# This is enforcement layer #4 of the four independent internet-isolation layers
# (§6.2). Even if routing/DNS were misconfigured, this table makes a non-tunnel
# packet impossible. Loaded by a systemd unit before the network comes up.
#
# Acceptance (INV-3): from a terminal, curl/ping/DNS to any public address fail;
# `ip route` shows only the WireGuard route + loopback.

flush ruleset

table inet zuup {
  chain input {
    type filter hook input priority 0; policy drop;
    iif "lo" accept
    iif "wg0" ct state established,related accept
    # everything else: dropped, logged to the volatile tmpfs ring buffer
    log prefix "ZUUP-DROP-IN " drop
  }

  chain output {
    type filter hook output priority 0; policy drop;
    oif "lo" accept
    oif "wg0" accept                      # tunnelled traffic to the Edge only
    udp dport 51820 oif "eth0" accept     # raw WireGuard handshake to the Edge endpoint
    log prefix "ZUUP-DROP-OUT " drop
  }

  chain forward {
    type filter hook forward priority 0; policy drop;
  }
}
