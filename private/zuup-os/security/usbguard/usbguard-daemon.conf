# ZUUP-OS USBGuard daemon policy (spec §7.2 / attack-matrix row 1).
# Install as /etc/usbguard/usbguard-daemon.conf.
#
# Defence-in-depth layer ON TOP of the kernel config (which already compiles
# out usb-storage and exotic class drivers): USBGuard authorises devices by
# an allow-list of (class, vendor, port) BEFORE the kernel binds a driver, so
# a BadUSB that re-enumerates as a keyboard is rejected at the port.

RuleFile=/etc/usbguard/rules.conf
# block: device stays unauthorised (no driver bind) until a rule allows it
ImplicitPolicyTarget=block
# devices present at boot are evaluated against the same rules — no grandfathering
PresentDevicePolicy=apply-policy
PresentControllerPolicy=apply-policy
InsertedDevicePolicy=apply-policy
# no IPC surface at all: nobody can live-edit policy on a sealed terminal
IPCAllowedUsers=
IPCAllowedGroups=
RestoreControllerDeviceState=false
AuthorizedDefault=none
AuditBackend=LinuxAudit
