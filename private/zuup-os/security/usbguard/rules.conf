# ZUUP-OS USBGuard rules (spec §7.2 / attack-matrix row 1) — allow-list only.
# Install as /etc/usbguard/rules.conf (root:root 0600).
#
# Policy: exactly the four devices a seat legitimately owns, each pinned to
# the physical port it was commissioned on (via-port) and its interface class
# — a device that changes port, class, or identity is blocked. Everything not
# matched here (storage, hubs-with-storage, second keyboards, network
# adapters, "charging" phones …) stays unauthorised: no driver ever binds.
#
# The {vendor:product} ids below are the centre's commissioned models; the
# commissioning script rewrites them per procurement batch and re-bakes the
# image (the rules ship inside the signed SquashFS, so swapping a reader is
# an image release, not a field edit).

# 1 — the seat keyboard: HID boot keyboard ONLY (class 03:00/01), fixed port
allow via-port "1-1" with-interface equals { 03:00:01 03:01:01 } if !rule-applied

# 2 — the seat mouse: HID boot mouse ONLY, fixed port
allow via-port "1-2" with-interface equals { 03:00:02 03:01:02 } if !rule-applied

# 3 — the UVC webcam (face capture, §8): video class only, fixed port
allow via-port "1-3" with-interface equals { 0e:01:00 0e:02:00 } if !rule-applied

# 4 — the fingerprint reader (CDC-ACM, §8): comm + data class, fixed port
allow via-port "1-4" with-interface equals { 02:02:01 0a:00:00 } if !rule-applied

# everything else: implicit block (usbguard-daemon.conf), and a HID device on
# the wrong port — the classic Rubber-Ducky move — matches nothing above.
