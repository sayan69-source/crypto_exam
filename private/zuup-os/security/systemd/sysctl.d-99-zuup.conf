# ZUUP-OS runtime kernel hardening (spec §7.2 complement) — install as
# /etc/sysctl.d/99-zuup.conf. The compile-time half lives in kernel/zuup.config;
# these are the knobs that exist only at runtime.

# no pointer leaks, no dmesg for unprivileged, no perf introspection
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.perf_event_paranoid = 3

# no ptrace at all — nothing on this image may inspect another process
kernel.yama.ptrace_scope = 3

# no unprivileged eBPF, no unprivileged user namespaces (container-escape class)
kernel.unprivileged_bpf_disabled = 1
user.max_user_namespaces = 0

# no kexec (would replace the attested kernel), no SysRq
kernel.kexec_load_disabled = 1
kernel.sysrq = 0

# core dumps could carry answer plaintext out of RAM — never write them
kernel.core_pattern = |/bin/false
fs.suid_dumpable = 0

# the exam VLAN is the only network; behave as a silent endpoint
net.ipv4.ip_forward = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.tcp_syncookies = 1
# IPv6 is compiled out (kernel/zuup.config); these guard a config drift
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
