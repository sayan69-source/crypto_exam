# ZUUP-OS logind lockdown (spec §7.4) — install as
# /etc/systemd/logind.conf.d/zuup.conf
#
# Together with the masked getty units (see kiosk README) this removes every
# console path: no VT is ever allocated, so Ctrl-Alt-F* has nothing to switch
# to (attack-matrix row 2), and the power button is policy, not surprise.

[Login]
NAutoVTs=0
ReserveVT=0
KillUserProcesses=yes
# the power key powers off (which forensically zeroes the session, INV-2) —
# nothing else at the seat is reachable
HandlePowerKey=poweroff
HandleSuspendKey=ignore
HandleHibernateKey=ignore
HandleLidSwitch=ignore
IdleAction=ignore
