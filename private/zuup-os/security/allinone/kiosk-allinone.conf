# DEV/ALL-IN-ONE drop-in for zuup-kiosk.service. Installed only in the
# --allinone image variant. It points the kiosk at the LOCAL proxy instead of a
# remote Edge, and makes the kiosk wait for the local stack to be up.
[Unit]
After=zuup-proxy.service zuup-edge.service
Requires=zuup-proxy.service

[Service]
# edge.local resolves to 127.0.0.1 (see /etc/hosts) and Caddy serves it on :80.
Environment=ZUUP_EDGE_URL=http://edge.local
