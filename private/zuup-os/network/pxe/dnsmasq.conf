# ZUUP-OS PXE + DHCP config, served BY THE EDGE (spec §6.4, §7.1, Phase 11).
#
# The Edge is the only DHCP/TFTP server on the exam VLAN. It hands terminals a
# LAN-only lease (no internet gateway, no public DNS) and chainloads the SIGNED
# SquashFS into RAM. A terminal that cannot verify the image signature does not
# boot (§7.1). Runs on the Edge appliance, not on a terminal.

# ── DHCP: exam VLAN only, NO default route to the internet (§6.2 layer 3) ───
interface=eth0
bind-interfaces
dhcp-range=10.0.0.50,10.0.0.250,255.255.255.0,1h
# Deliberately NO `dhcp-option=3` (router) and NO `dhcp-option=6` (DNS→internet).
dhcp-option=6,10.0.0.1            # DNS = the Edge's local resolver only
dhcp-option=15,local             # search domain: .local

# ── local resolver: *.local from the Edge, everything else NXDOMAIN ─────────
domain=local
local=/local/
no-resolv                         # never forward to an upstream internet resolver
address=/edge.local/10.0.0.1

# ── PXE: chainload the signed image via the build-key-trusted bootloader ────
enable-tftp
tftp-root=/srv/tftp
dhcp-boot=zuup/shimx64.efi        # Secure Boot shim → signed GRUB → signed kernel
pxe-service=x86-64_EFI,"ZUUP-OS secure terminal",zuup/shimx64.efi
