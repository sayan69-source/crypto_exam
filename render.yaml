# Render Blueprint — one-click deploy of the public CryptoExam website.
# Defines: a free Postgres DB, the FastAPI backend, and the Next.js frontend.
#
#   1. Push this repo to GitHub (done).
#   2. On https://render.com → New → Blueprint → pick this repo.
#   3. Render reads this file and creates all three services.
#   4. After deploy, update CORS_ALLOW_ORIGINS and NEXT_PUBLIC_API_URL with
#      the actual service URLs and redeploy both services.
#
# Free tier note: web services sleep after ~15 min idle (first hit is slow);
# the free Postgres expires after 90 days. Region `singapore` is closest to India.

databases:
  - name: cryptoexam-db-sayan
    databaseName: cryptoexam
    user: cryptoexam
    plan: free
    region: singapore

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────
  - type: web
    name: cryptoexam-api-sayan
    runtime: docker
    rootDir: public/backend
    dockerfilePath: ./Dockerfile.render
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cryptoexam-db-sayan
          property: connectionString
      # DEBUG=true enables the dev OTP path (OTP returned in response) so
      # login works without Twilio. Set to "false" + provide Twilio creds
      # for production-grade SMS delivery.
      - key: DEBUG
        value: "true"
      # Seed the DB once on a fresh deploy (admin/exams/centres) while
      # keeping the deploy autonomous. Idempotent — no-ops once seeded.
      - key: SEED_ON_START
        value: "true"
