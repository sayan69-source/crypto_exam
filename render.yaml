      # Placeholder value; update after the frontend URL is known.
      - key: CORS_ALLOW_ORIGINS
        value: "https://cryptoexam-web-sayan.onrender.com"
      # The System Admin identity — seeded on first boot.
      - key: SEED_ADMIN_EMAIL
        value: "admin@cryptoexam.dev"
      - key: SEED_ADMIN_PASSWORD
        value: "CryptoExam@2026!"
      - key: SEED_ADMIN_PHONE
        value: "+919000000000"
      # Twilio not configured — DEBUG=true enables dev-OTP (returned in response).
      # To switch to real SMS: set these + set DEBUG=false.
      - key: TWILIO_ACCOUNT_SID
        value: ""
      - key: TWILIO_AUTH_TOKEN
        value: ""
      - key: TWILIO_FROM_NUMBER
        value: ""
      # HQ→Edge provisioning shared secret (only needed if syncing to a centre Edge).
      - key: EDGE_PROVISIONING_KEY
        value: ""

  # ── Next.js frontend ─────────────────────────────────────────────────────
  - type: web
    name: cryptoexam-web-sayan
    runtime: docker
    rootDir: public/frontend
    dockerfilePath: ./Dockerfile.render
    plan: free
    region: singapore
    envVars:
      # MUST be the backend's public URL + /api/v1. It is baked in at BUILD time,
      # so after the backend is live, set this and trigger a frontend redeploy.
      #   e.g. https://cryptoexam-backend.onrender.com/api/v1
      - key: NEXT_PUBLIC_API_URL
        value: "https://cryptoexam-api-sayan.onrender.com/api/v1"
      - key: NEXT_PUBLIC_USE_MOCK
        value: "false"
